version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: psta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: psta_user
      POSTGRES_PASSWORD: psta_password
      POSTGRES_DB: psta
    ports:
      - "5432:5432"
    volumes:
      - psta-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psta_user -d psta"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  psta-postgres-data:
